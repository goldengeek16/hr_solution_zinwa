 
   {% extends 'main.html' %}
 
  {% block content %}
  {% include 'navbar.html'  %}

   <main class="main-content">
    {% include 'header.html'  %}
 

 <!-- Personal Information -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Edit Spouse Personal Information</h2>
        </div>
        
        <form class="form" method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            {% for field in form %}

            <div class="">
                <div class="form-group">
                    <label>{{field.label}}</label>
                    {{field}}
                </div>

            </div>
            {% endfor %}
        </form>


     
      </div>

     

  </main>
         {% endblock content %}
