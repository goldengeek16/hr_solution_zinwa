<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Profile card | White & simple</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f1f4f9 0%, #e6ecf3 100%);
      font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* main profile card — pure white, soft rounded, minimal shadow */
    .profile-card {
      max-width: 560px;
      width: 100%;
      background: #ffffff;
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.02);
      padding: 2rem 2rem 2.25rem 2rem;
      transition: box-shadow 0.2s ease;
    }

    .profile-card:hover {
      box-shadow: 0 28px 40px -16px rgba(0, 0, 0, 0.12);
    }

    /* profile picture section */
    .profile-pic-section {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .avatar-wrapper {
      position: relative;
      display: inline-block;
    }

    .profile-img {
      width: 128px;
      height: 128px;
      border-radius: 50%;
      object-fit: cover;
      background: #f2f5f9;
      border: 4px solid white;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05), 0 0 0 1px #edf2f8;
    }

    /* subtle badge decoration (only visual) */
    .avatar-badge {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: #ffffff;
      border-radius: 30px;
      padding: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      border: 1px solid #eef2f8;
    }

    .avatar-badge svg {
      width: 18px;
      height: 18px;
      display: block;
      stroke: #6c8da3;
      stroke-width: 1.8;
      fill: none;
    }

    /* user info area */
    .user-info {
      text-align: center;
      margin-bottom: 1.6rem;
    }

    .name {
      font-size: 1.9rem;
      font-weight: 650;
      letter-spacing: -0.3px;
      color: #1a2c38;
      margin-bottom: 0.2rem;
    }

    .surname {
      font-size: 1.2rem;
      font-weight: 500;
      color: #3c5a6b;
      margin-bottom: 0.2rem;
      letter-spacing: -0.2px;
    }

    /* bio container — clean, subtle background */
    .bio-container {
      background: #fafcfe;
      border-radius: 1.5rem;
      padding: 1.1rem 1.3rem;
      margin-bottom: 2rem;
      border: 1px solid #edf2f7;
    }

    .bio-label {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      color: #8da0ae;
      margin-bottom: 0.65rem;
    }

    .bio-label svg {
      width: 14px;
      height: 14px;
      stroke: #8da0ae;
    }

    .bio-text {
      font-size: 1rem;
      line-height: 1.5;
      color: #2c4556;
      font-weight: 450;
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* blue button — main accent */
    .blue-button {
      background: #1e6df2;
      border: none;
      width: 100%;
      padding: 0.9rem 1rem;
      border-radius: 2.2rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      box-shadow: 0 2px 6px rgba(30, 109, 242, 0.2);
    }

    .blue-button:hover {
      background: #0f5ad9;
      transform: scale(0.98);
      box-shadow: 0 4px 12px rgba(30, 109, 242, 0.25);
    }

    .blue-button:active {
      transform: scale(0.97);
    }

    /* simple note at bottom */
    .info-note {
      text-align: center;
      margin-top: 1.3rem;
      font-size: 0.7rem;
      color: #95aeba;
      border-top: 1px solid #eef2f8;
      padding-top: 1.1rem;
    }

    @media (max-width: 540px) {
      .profile-card {
        padding: 1.5rem;
      }
      .name {
        font-size: 1.6rem;
      }
      .surname {
        font-size: 1rem;
      }
      .profile-img {
        width: 108px;
        height: 108px;
      }
    }
  </style>
</head>
<body>

<div class="profile-card">
  <!-- Profile picture section -->
  <div class="profile-pic-section">
    <div class="avatar-wrapper">
      <img class="profile-img" 
           src="https://ui-avatars.com/api/?background=D9EAFB&color=2C5F7A&bold=true&size=128&rounded=true&fontsize=0.58&name=EV" 
           alt="Profile avatar">
      <div class="avatar-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke-width="1.8"/>
          <circle cx="12" cy="7" r="4" stroke-width="1.8"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Name and Surname -->
  <div class="user-info">
    <div class="name">Elara</div>
    <div class="surname">Voss</div>
  </div>

  <!-- Bio section with clean background -->
  <div class="bio-container">
    <div class="bio-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 12H4M12 4v16M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>
      </svg>
      <span>about</span>
    </div>
    <div class="bio-text">
      ✦ Designer & creative explorer. Passionate about minimal interfaces, morning light, and crafting meaningful digital experiences.
    </div>
  </div>

  <!-- Blue edit button (visual only, static) -->
  <button class="blue-button">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
      <path d="M17 3l4 4-7 7H10v-4l7-7zM4 20h16" />
    </svg>
    Edit profile
  </button>
  <div class="info-note">
    ✦ simple profile card · white & clean ✦
  </div>
</div>

</body>
</html>
